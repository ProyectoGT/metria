name: React Doctor

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    name: React Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Metria CRM — React Doctor
        uses: millionco/react-doctor@main
        with:
          project: metria-crm
          diff: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Phase 1: informativo, no bloquea deploy.
          # Cambiar a "error" cuando el proyecto esté limpio (phase 2).
          fail-on: none
          annotations: true
